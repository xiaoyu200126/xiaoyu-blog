<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XIAOYU — 随笔</title>
<meta name="description" content="XIAOYU 的随笔博客，记录效率工具、AI学习与日常思考。">
<link rel="preconnect" href="https://fonts.googleapis.cn">
<link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
<link href="https://fonts.googleapis.cn/css2?family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c1:#1a1a1a;--c2:#666;--c3:#999;--b1:#eee;--bg:#fff;--mw:720px;--underline:#4A90E2;--fs:-apple-system,"PingFang SC","Noto Sans SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;--fp:"Noto Serif SC",Georgia,"Songti SC",serif}
body{font-family:var(--fs);background:var(--bg);color:var(--c1);line-height:1.8;-webkit-font-smoothing:antialiased;font-size:15px}
header{text-align:center;padding:80px 24px 60px}
.brand{font-family:var(--fp);font-style:italic;font-weight:300;font-size:40px;letter-spacing:.12em;line-height:1.2}
.brand-sub{font-family:var(--fp);font-style:italic;font-size:13px;letter-spacing:.25em;color:var(--c3);margin-top:10px;text-transform:uppercase}
main{max-width:var(--mw);margin:0 auto;padding:0 24px 100px}
article{padding:44px 0;border-bottom:1px solid var(--b1);cursor:pointer;transition:opacity .25s}
article:first-child{padding-top:10px}
article:hover{opacity:.65}
h2{font-size:21px;font-weight:700;line-height:1.45;letter-spacing:-.01em;margin-bottom:14px;color:var(--c1);position:relative;display:inline-block}
h2::after{content:'';position:absolute;bottom:2px;left:0;width:0;height:18px;background:rgba(74,144,226,.6);transform-origin:left center;transition:width .35s cubic-bezier(.4,0,.2,1);z-index:-1}
article:hover h2::after{width:100%}
.meta-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;font-size:12px;color:var(--c3);letter-spacing:.03em}
.author::before{content:"by "}
.excerpt{font-size:15px;color:var(--c2);line-height:1.75;margin-bottom:18px}
.meta-bottom{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--c3);letter-spacing:.02em;flex-wrap:wrap}
.tag::after{content:" ·"}
.tag:last-child::after{content:""}
footer{text-align:center;padding:100px 24px 80px;opacity:.2}
.f-logo{font-family:var(--fp);font-style:italic;font-weight:300;font-size:30px;letter-spacing:.18em;line-height:1.3}
.f-sub{font-family:var(--fp);font-style:italic;font-size:11px;letter-spacing:.2em;margin-top:4px;text-transform:uppercase}
::selection{background:var(--c1);color:var(--bg)}
@media(max-width:640px){header{padding:60px 20px 40px}.brand{font-size:30px}h2{font-size:19px}article{padding:32px 0}.f-logo{font-size:22px}}
</style>
</head>
<body>

<header>
  <div class="brand">XIAOYU</div>
  <div class="brand-sub">随笔 & 思考</div>
</header>

<main id="list"></main>

<footer>
  <div class="f-logo">XIAOYU</div>
  <div class="f-sub">THOUGHTS & NOTES</div>
</footer>

<script>
const articles=[
{title:"实用主义者的效率工具清单",excerpt:"工具不在于多，而在于能否真正嵌入工作流。这份清单里的每一款，都经过至少一年的实战检验。",tags:["效率","工具"],date:"2024-02-01",author:"XIAOYU",len:1250,slug:"2024/02/01/tools-recommendation"},
{title:"All IN AI — 我的AI学习之路",excerpt:"从大语言模型到 AI Agent，从理论到落地。这条路走得不快，但每一步都留下了脚印。",tags:["AI","学习"],date:"2024-01-15",author:"XIAOYU",len:2850,slug:"2024/01/15/ai-journey"},
{title:"你好，世界",excerpt:"每一个博客的第一篇文章，都是一次郑重的自我介绍。这里会记录技术、工具，以及一些无关紧要的思考。",tags:["随笔","开篇"],date:"2024-01-01",author:"XIAOYU",len:580,slug:"2024/01/01/hello-world"}
];

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  const day = d.getDate();
  return `${year}年${month}月${day}日`;
}

function rel(d){
  const n=new Date(),t=new Date(d),diff=Math.floor((n-t)/864e5);
  return diff<1?"今天":diff<2?"昨天":diff<7?diff+" 天前":diff<30?Math.floor(diff/7)+" 周前":formatDate(d);
}

function rt(l){return Math.ceil(l/300)+"min read"}

const list=document.getElementById('list');
articles.forEach(a=>{
  const el=document.createElement('article');
  el.innerHTML=`
    <div class="meta-top">
      <span class="author">${a.author}</span>
      <span>${rel(a.date)}</span>
    </div>
    <h2>${a.title}</h2>
    <div class="excerpt">${a.excerpt}</div>
    <div class="meta-bottom">
      ${a.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
      <span>${rt(a.len)}</span>
    </div>`;
  el.onclick=()=>window.location.href='/'+a.slug;
  list.appendChild(el)
});

// 标题下划线动画 - 动态计算文本宽度
window.addEventListener('load', function() {
  var h2s = document.querySelectorAll('h2');
  h2s.forEach(function(h2, i) {
    var style = document.createElement('style');
    var temp = document.createElement('span');
    temp.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font-family:' + getComputedStyle(h2).fontFamily + ';font-size:' + getComputedStyle(h2).fontSize + ';font-weight:' + getComputedStyle(h2).fontWeight;
    temp.textContent = h2.textContent;
    document.body.appendChild(temp);
    style.textContent = 'article:nth-child(' + (i+1) + ') h2::after{width:' + temp.offsetWidth + 'px}';
    document.body.removeChild(temp);
    document.head.appendChild(style);
  });
});
</script>

</body>
</html>

backend:
  name: github
  repo: xiaoyu200126/xiaoyu-blog
  branch: main

media_folder: "public/images/posts"
public_folder: "/images/posts"

collections:
  - name: "posts"
    label: "文章"
    folder: "public"
    create: true
    slug: "{{slug}}"
    identifier_field: path
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "日期", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss", date_format: "YYYY-MM-DD", time_format: "HH:mm:ss", default: now}
      - {label: "作者", name: "author", widget: "string", default: "XIAOYU"}
      - {label: "封面", name: "cover", widget: "image", required: false}
      - {label: "标签", name: "tags", widget: "list", required: false}
      - {label: "分类", name: "categories", widget: "list", required: false}
      - {label: "内容", name: "body", widget: "markdown"}

backend:
  name: github
  repo: xiaoyu200126/xiaoyu-blog
  branch: main

# GitHub Backend 需要在 GitHub 创建 OAuth App
# 或使用 Netlify Identity 配合 Git Gateway
# 如果登录失败，需要配置以下任一方式：

# 方式1: 使用 Netlify Identity (需要启用 Netlify Identity)
# backend:
#   name: git-gateway
#   branch: main

media_folder: "public/images/posts"
public_folder: "/images/posts"

site_url: https://xiaoyu-blog.cn
display_url: https://xiaoyu-blog.cn
logo_url: https://xiaoyu-blog.cn/images/logo-new.png

collections:
  - name: "posts"
    label: "文章"
    folder: "public"
    create: true
    slug: "{{slug}}"
    preview_path: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss"}
      - {label: "作者", name: "author", widget: "string", default: "XIAOYU"}
      - {label: "标签", name: "tags", widget: "list", required: false}
      - {label: "分类", name: "categories", widget: "list", required: false}
      - {label: "正文", name: "body", widget: "markdown"}

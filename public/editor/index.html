<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客编辑器 - XIAOYU的随笔</title>
  
  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&family=Mulish:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Mulish', sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
    }
    
    .header h1 {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.1em;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-family: 'Mulish', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      background: #333;
      color: #fff;
    }
    
    .btn:hover { background: #444; }
    .btn-save { background: #2a2; }
    .btn-save:hover { background: #3b3; }
    
    .file-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
    }
    
    .file-selector label { font-size: 0.9rem; color: #888; }
    
    .file-selector select {
      padding: 8px 16px;
      background: #333;
      color: #fff;
      border: 1px solid #444;
      border-radius: 4px;
      font-family: 'Mulish', sans-serif;
      font-size: 0.9rem;
      min-width: 300px;
    }
    
    .editor-container {
      display: flex;
      height: calc(100vh - 120px);
    }
    
    .editor-pane, .preview-pane {
      flex: 1;
      height: 100%;
      overflow-y: auto;
    }
    
    .editor-pane { border-right: 1px solid #333; }
    
    .editor-pane textarea {
      width: 100%;
      height: 100%;
      padding: 24px;
      background: #0f0f0f;
      color: #e0e0e0;
      border: none;
      resize: none;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .editor-pane textarea:focus { outline: none; }
    
    .preview-pane {
      padding: 24px 40px;
      background: #fff;
      color: #0f0f0f;
    }
    
    .preview-pane h1, .preview-pane h2, .preview-pane h3 {
      font-family: 'Josefin Sans', sans-serif;
      margin: 1em 0 0.5em;
    }
    
    .preview-pane p { margin: 1em 0; line-height: 1.8; }
    .preview-pane a { color: #333; text-decoration: underline; }
    .preview-pane code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
    .preview-pane pre { background: #f5f5f5; padding: 16px; border-radius: 6px; overflow-x: auto; }
    .preview-pane blockquote { border-left: 3px solid #333; padding-left: 16px; margin: 1em 0; color: #666; }
    .preview-pane ul, .preview-pane ol { margin: 1em 0; padding-left: 24px; }
    .preview-pane img { max-width: 100%; border-radius: 6px; }
    
    .status-bar {
      display: flex;
      align-items: center;
      padding: 8px 24px;
      background: #222;
      font-size: 0.8rem;
      color: #888;
    }
    
    .status-item { display: flex; align-items: center; gap: 6px; }
    .status-modified { color: #fa0; }
    .status-saved { color: #2a2; }
    
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: #333;
      color: #fff;
      border-radius: 6px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    
    .toast.show { opacity: 1; }
    .toast.success { background: #2a2; }
    .toast.error { background: #a22; }
  </style>
</head>
<body>
  <div class="header">
    <h1>XIAOYU's EDITOR</h1>
    <div>
      <button class="btn" onclick="loadFile()">📂 读取</button>
      <button class="btn btn-save" onclick="saveFile()">💾 保存草稿</button>
    </div>
  </div>
  
  <div class="file-selector">
    <label>选择文件：</label>
    <select id="fileSelect">
      <option value="">-- 选择要编辑的文件 --</option>
      <optgroup label="首页">
        <option value="public/index.html">index.html (首页)</option>
      </optgroup>
      <optgroup label="文章">
        <option value="public/2024/01/01/hello-world/index.html">你好，世界</option>
        <option value="public/2024/01/15/ai-journey/index.html">All IN AI - 我的AI学习之路</option>
        <option value="public/2024/02/01/tools-recommendation/index.html">实用主义者的效率工具清单</option>
      </optgroup>
      <optgroup label="页面">
        <option value="public/about/index.html">about.html (关于)</option>
        <option value="public/contact/index.html">contact.html (联系)</option>
      </optgroup>
    </select>
  </div>
  
  <div class="status-bar">
    <span class="status-item" id="statusFile">📄 未选择文件</span>
    <span class="status-item" id="statusModified" style="display:none"> <span class="status-modified">●</span> 已修改</span>
    <span class="status-item" id="statusSaved" style="display:none"> <span class="status-saved">✓</span> 已保存</span>
    <span style="margin-left:auto;color:#666">编辑完成后告诉晓宇，同步到网站</span>
  </div>
  
  <div class="editor-container">
    <div class="editor-pane">
      <textarea id="editor" placeholder="选择文件后在此编辑..." spellcheck="false"></textarea>
    </div>
    <div class="preview-pane" id="preview">
      <p style="color:#888;text-align:center;margin-top:40%">选择文件后可预览效果</p>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const fileSelect = document.getElementById('fileSelect');
    const statusFile = document.getElementById('statusFile');
    const statusModified = document.getElementById('statusModified');
    const statusSaved = document.getElementById('statusSaved');
    const toast = document.getElementById('toast');
    
    let currentFile = null;
    let isModified = false;
    
    marked.setOptions({ breaks: true, gfm: true });
    
    // 监听编辑器变化
    editor.addEventListener('input', function() {
      updatePreview();
      markModified();
    });
    
    // 文件选择变化
    fileSelect.addEventListener('change', function() {
      const file = fileSelect.value;
      if (!file) return;
      
      if (isModified && !confirm('当前有未保存的修改，确定要放弃吗？')) {
        fileSelect.value = currentFile || '';
        return;
      }
      
      loadFile(file);
    });
    
    function updatePreview() {
      const content = editor.value;
      if (!content) {
        preview.innerHTML = '<p style="color:#888;text-align:center;margin-top:40%">选择文件后可预览效果</p>';
        return;
      }
      
      // HTML内容预览
      if (content.includes('<')) {
        preview.innerHTML = content;
      } else {
        // Markdown预览
        preview.innerHTML = marked.parse(content);
      }
    }
    
    function markModified() {
      if (editor.value !== localStorage.getItem('editor_content_' + currentFile)) {
        isModified = true;
        statusModified.style.display = 'inline-flex';
        statusSaved.style.display = 'none';
      }
    }
    
    async function loadFile(filePath) {
      try {
        const response = await fetch('/' + filePath);
        if (!response.ok) throw new Error('文件不存在');
        
        let content = await response.text();
        
        // 提取body内容
        const bodyMatch = content.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
        if (bodyMatch) {
          let bodyContent = bodyMatch[1];
          // 清理脚本和样式标签
          bodyContent = bodyContent.replace(/<script[\s\S]*?<\/script>/gi, '');
          bodyContent = bodyContent.replace(/<style[\s\S]*?<\/style>/gi, '');
          // 清理logo等固定元素
          bodyContent = bodyContent.replace(/<header[^>]*>[\s\S]*?<\/header>/gi, '');
          bodyContent = bodyContent.replace(/<footer[^>]*>[\s\S]*?<\/footer>/gi, '');
          content = bodyContent.trim();
        }
        
        editor.value = content;
        currentFile = filePath;
        isModified = false;
        
        statusFile.textContent = '📄 ' + filePath.split('/').pop();
        statusModified.style.display = 'none';
        statusSaved.style.display = 'none';
        
        updatePreview();
        showToast('文件已加载', 'success');
      } catch (err) {
        showToast('加载失败: ' + err.message, 'error');
      }
    }
    
    function loadFile() {
      const path = prompt('请输入文件路径（如：public/index.html）：', currentFile || 'public/index.html');
      if (!path) return;
      fileSelect.value = path;
      loadFile(path);
    }
    
    function saveFile() {
      if (!currentFile) {
        showToast('请先选择要保存的文件', 'error');
        return;
      }
      
      localStorage.setItem('editor_content_' + currentFile, editor.value);
      localStorage.setItem('editor_modified_' + currentFile, Date.now().toString());
      
      isModified = false;
      statusModified.style.display = 'none';
      statusSaved.style.display = 'inline-flex';
      
      showToast('草稿已保存！告诉晓宇同步到网站', 'success');
    }
    
    function showToast(message, type) {
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // 检查是否有未同步的草稿
    window.addEventListener('load', function() {
      const savedFiles = Object.keys(localStorage).filter(k => k.startsWith('editor_modified_'));
      if (savedFiles.length > 0 && confirm('发现未同步的草稿，是否恢复？')) {
        const filePath = savedFiles[0].replace('editor_modified_', '');
        const content = localStorage.getItem('editor_content_' + filePath);
        if (content) {
          fileSelect.value = filePath;
          editor.value = content;
          currentFile = filePath;
          statusFile.textContent = '📄 ' + filePath.split('/').pop();
          statusSaved.style.display = 'inline-flex';
          updatePreview();
        }
      }
    });
  </script>
</body>
</html>
